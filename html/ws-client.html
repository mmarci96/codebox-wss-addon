<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>WebSocket Test Client</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        #log {
            border: 1px solid #ccc;
            height: 200px;
            overflow-y: scroll;
            padding: 10px;
            margin-top: 10px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <h1>WebSocket Client</h1>

    <input id="usernameInput" type="text" placeholder="Enter username" />
    <button onclick="sendLogin()">Send</button>
    <input id="messageInput" type="text" placeholder="Enter message" />
    <button onclick="sendMessage()">Send</button>
    <button onclick="connect()">Reconnect</button>

    <div id="log"></div>

    <script>
        let ws;
        const log = document.getElementById("log");

        function connect() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }

            ws = new WebSocket("ws://localhost:9000/ws");

            ws.onopen = () => {
                logMessage("✅ Connected. Now click Login to authenticate.");
            };

            ws.onmessage = (event) => {
                logMessage("📨 " + event.data);
            };

            ws.onclose = () => {
                logMessage("❌ Disconnected");
            };

            ws.onerror = (err) => {
                logMessage("⚠️ Error: " + err.message);
            };
        }

        function sendLogin() {
            const username = document.getElementById("usernameInput").value;
            if (!username) {
                logMessage("❗ Please enter a username first.");
                return;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                const loginMsg = {
                    type: "login",
                    username: username
                };
                ws.send(JSON.stringify(loginMsg));
                logMessage("➡️ Sent login as: " + username);
            } else {
                logMessage("❗ WebSocket is not connected.");
            }
        }

        function sendMessage() {
            const input = document.getElementById("messageInput");
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(input.value);
                logMessage("➡️ " + input.value);
                input.value = "";
            } else {
                logMessage("❗ Not connected");
            }
        }

        function logMessage(msg) {
            log.textContent += msg + "\n";
            log.scrollTop = log.scrollHeight;
        }
    </script>

</body>

</html>
